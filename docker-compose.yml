services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: suporte-ia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     suporte
      POSTGRES_PASSWORD: suporte123
      POSTGRES_DB:       suporte_ia
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suporte -d suporte_ia"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend FastAPI ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suporte-ia-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgresql+asyncpg://suporte:suporte123@db:5432/suporte_ia
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend React ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: suporte-ia-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
